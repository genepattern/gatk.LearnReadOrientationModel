name: "gatk.LearnReadOrientationModel - Basic smoke test"
module: gatk.LearnReadOrientationModel
description: >
  Tests LearnReadOrientationModel on a small synthetic F1R2 counts tar.gz file.
  Verifies that the EM algorithm runs and produces an artifact-prior tar.gz output.
  The test file was generated by generate_test_data.py in this directory.

params:
  input.tar.gz: data/f1r2_test.tar.gz
  output.file.name: artifact-prior.tar.gz

assertions:
  files:
    - artifact-prior.tar.gz
